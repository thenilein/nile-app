<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Nile Cafe</title>
    <!-- MSG91 OTP Provider -->
    <script type="text/javascript">
var configuration = {
  widgetId: "346869635532313534353235",
  tokenAuth: "427916TifOeIbAN69b05c02P1",
  exposeMethods: true,
  success: (data) => {
    console.log('OTP verified', data);
    window.dispatchEvent(new CustomEvent('otpVerified', { detail: data }));
  },
  failure: (error) => {
    console.log('OTP failed', error);
    window.dispatchEvent(new CustomEvent('otpFailed', { detail: error }));
  }
};
</script>
<script type="text/javascript">
(function loadOtpScript(urls) {
  let i = 0;
  function attempt() {
    const s = document.createElement('script');
    s.src = urls[i];
    s.async = true;
    s.onload = () => {
      if (typeof window.initSendOTP === 'function') {
        window.initSendOTP(configuration);
      }
    };
    s.onerror = () => { i++; if (i < urls.length) attempt(); };
    document.head.appendChild(s);
  }
  attempt();
})([
  'https://verify.msg91.com/otp-provider.js',
  'https://verify.phone91.com/otp-provider.js'
]);
</script>
</head>

</body>
